apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: tf-gcp-push-
  namespace: argo
spec:
  serviceAccountName: workflow-runner
  entrypoint: main
  volumes:
    - name: work
      emptyDir: {}
  arguments:
    parameters:
      - name: repo_url
        value: "https://github.com/yogenderPalChandra/argowf-terraform-kind.git"
      - name: revision
        value: "main"
      - name: customer_impersonate_sa
        value: "sa-comcd-deployment@CUSTOMER_PROJECT.iam.gserviceaccount.com"
      - name: tf_backend_bucket
        value: "YOUR_TF_STATE_BUCKET"
      - name: tf_backend_prefix
        value: "state"

  templates:
    - name: main
      dag:
        tasks:
          - name: clone
            template: clone
          - name: parse-order
            dependencies: [clone]
            template: parse-order
          - name: tf-init
            dependencies: [parse-order]
            templateRef:
              name: terraform-init
              template: terraform-init
            arguments:
              parameters:
                - name: workdir
                  value: "{{tasks.parse-order.outputs.parameters.workdir}}"
                - name: tf_backend_bucket
                  value: "{{workflow.parameters.tf_backend_bucket}}"
                - name: tf_backend_prefix
                  value: "{{workflow.parameters.tf_backend_prefix}}/{{tasks.parse-order.outputs.parameters.project}}"
          - name: tf-plan
            dependencies: [tf-init]
            templateRef:
              name: terraform-plan
              template: terraform-plan
            arguments:
              parameters:
                - name: workdir
                  value: "{{tasks.parse-order.outputs.parameters.workdir}}"

    - name: clone
      container:
        image: alpine/git:2.45.2
        command: [sh, -lc]
        args:
          - |
            git clone "{{workflow.parameters.repo_url}}" /work/repo
            cd /work/repo
            git checkout "{{workflow.parameters.revision}}"
      volumeMounts:
        - name: work
          mountPath: /work

    - name: parse-order
      outputs:
        parameters:
          - name: project
            valueFrom:
              path: /tmp/project.txt
          - name: workdir
            valueFrom:
              path: /tmp/workdir.txt
      container:
        image: python:3.11-alpine
        command: [sh, -lc]
        env:
          - name: GOOGLE_IMPERSONATE_SERVICE_ACCOUNT
            value: "{{workflow.parameters.customer_impersonate_sa}}"
        args:
          - |
            python - <<'PY'
            import yaml, os, pathlib
            order = yaml.safe_load(open("/work/repo/order.yaml","r"))
            step0 = order["Steps"][0]
            project = step0["project"]
            path = step0.get("path","terraform")
            workdir = str(pathlib.Path("/work/repo")/path)
            open("/tmp/project.txt","w").write(project)
            open("/tmp/workdir.txt","w").write(workdir)
            PY
            echo "Parsed project=$(cat /tmp/project.txt)"
            echo "Parsed workdir=$(cat /tmp/workdir.txt)"
      volumeMounts:
        - name: work
          mountPath: /work
