kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: argowf
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 8484
    protocol: TCP
  - containerPort: 443
    hostPort: 44304
    protocol: TCP